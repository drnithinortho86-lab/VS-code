<!DOCTYPE html>
<html>
<head>
<style>

.grid-item1 {grid-area: haeder;}
.grid-item2 {grid-area: menu;}
.grid-item3 {grid-area: main;}
.grid-item4 {grid-area: footer;}

.grid-container {
display: grid;
grid-template-columns: auto auto auto auto auto;
grid-template-areas:
'header header header header header'
'menu main main main'
'menu footer footer footer footer'
background-colour: MediumSeaGreen;
padding: 10px;
}

.grid-container div {
background-color: #768e77;
text-align: center;
padding: 20px;
border: 3px solid MediumSeaGreen;
}

</style>
</head>
<body>

<div class="grid container">
<div class="griditem 1">Header</div>
<div class="griditem 2">Menu</div>
<div class="griditem 3">Main</div>
<div class="griditem 4">Footer</div>
</div>

</body>
</html>
